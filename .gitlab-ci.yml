stages:
  - fetch
  - publish

variables:
  GITHUB_REPO: cern-eos/eos-tui
  EOS_CODENAME: eos-tui

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

fetch_github_release:
  stage: fetch
  image: gitlab-registry.cern.ch/linuxsupport/alma9-base
  script:
    # alma9-base ships coreutils-single; installing full coreutils conflicts with it.
    - dnf install -y --setopt=install_weak_deps=False curl jq
    - bash gitlab-ci/fetch_github_release.sh
  artifacts:
    paths:
      - github-release/
    expire_in: 1 week
  retry:
    max: 2
    when:
      - script_failure
      - runner_system_failure
      - stuck_or_timeout_failure

publish_artifacts:
  stage: publish
  image: gitlab-registry.cern.ch/linuxsupport/alma9-base
  script:
    - dnf install -y --setopt=install_weak_deps=False sudo sssd-client createrepo_c tree
    - tree github-release || true
    - sudo -u stci -H ./gitlab-ci/publish_artifacts.sh
  needs:
    - job: fetch_github_release
      artifacts: true
  tags:
    - docker_node
  retry: 2
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
